<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Item Form</title>
    <link rel="stylesheet" href="ReportItemstyle.css">
</head>
<body>

<div class="form-container">
    <h2>Report Item</h2>
    
    <form>
        <div class="row">
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" placeholder="">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select>
                    <option>Electronics</option>
                    <option>Clothing</option>
                    <option>Personal Effects</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea rows="4" placeholder="Give the description of the product Found/Lost....."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local">
            </div>
            <div class="form-group">
                <label>Location (Where Lost/Found)</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Status</label>
                <select>
                    <option>-- Select Status --</option>
                    <option>Lost</option>
                    <option>Found</option>
                </select>
            </div>
            <div class="form-group">
                <label>Contact Information</label>
                <input type="text">
            </div>
        </div>

        <div class="form-group">
            <label>Upload Image (if available)</label>
            <div class="file-input-wrapper">
                <input type="file">
            </div>
        </div>

        <button type="submit" class="submit-btn">Report Item</button>
    </form>
</div>

</body>
</html>

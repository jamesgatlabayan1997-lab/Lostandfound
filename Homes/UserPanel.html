<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel</title>
    <link rel="stylesheet" href="UserPanelstyle.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class='bx bxl-flutter'></i> LOST & FOUND
            </div>
            <ul class="nav-links">
                <li class="active"><i class='bx bx-home'></i> Dashboard</li>
                <li><i class='bx bx-user'></i> Profile</li>
                <li><i class='bx bx-package'></i> My Listings</li>
                <li><i class='bx bx-cog'></i> Settings</li>
                <li><i class='bx bx-log-out'></i> Logout</li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h2>Welcome, John Doe</h2>
            </header>

            <section class="dashboard">
                <div class="card">
                    <h3>Total Listings</h3>
                    <p>12</p>
                </div>
                <div class="card">
                    <h3>Items Found</h3>
                    <p>5</p>
                </div>
                <div class="card">
                    <h3>Items Lost</h3>
                    <p>7</p>
                </div>
            </section>

            <section class="user-info">
                <h3>Profile Info</h3>
                <p>Email: john.doe@email.com</p>
                <p>Phone: +1 (555) 012-3456</p>
            </section>
        </main>
    </div>
</body>
</html>
